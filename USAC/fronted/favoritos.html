<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Favoritos - USAC</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>❤️ Mis Favoritos</h1>
            <button onclick="location.href='index.html'" class="btn-nav">Volver a la Tienda</button>
        </div>
    </header>

    <main class="container">
        <div id="lista-favoritos" class="grid-productos"></div>
    </main>

    <script>
        function obtenerFavoritos() {
            const datos = localStorage.getItem('favoritos');
            if (!datos) return [];

            try {
                const favoritos = JSON.parse(datos);
                return Array.isArray(favoritos) ? favoritos : [];
            } catch (error) {
                console.warn('Favoritos inválidos en localStorage:', error);
                return [];
            }
        }

        function cargarFavoritos() {
            const favoritos = obtenerFavoritos();
            const contenedor = document.getElementById('lista-favoritos');

            contenedor.innerHTML = '';

            if (favoritos.length === 0) {
                contenedor.innerHTML = "<h3 style='grid-column: 1/-1; text-align: center;'>No tienes productos favoritos aún.</h3>";
                return;
            }

            favoritos.forEach((prod, index) => {
                const imagen = prod.image || 'img/placeholder.png';
                const titulo = prod.title || 'Producto sin nombre';
                const precio = typeof prod.price === 'number' ? prod.price : Number(prod.price);
                const precioTexto = Number.isFinite(precio) ? `GTQ ${precio.toFixed(2)}` : 'Precio no disponible';

                contenedor.innerHTML += `
                    <div class="producto-card">
                        <img src="${imagen}" class="producto-imagen" style="height: 100px;" alt="${titulo}">
                        <p class="producto-nombre" style="height: auto;">${titulo}</p>
                        <p class="producto-precio">${precioTexto}</p>
                        <button class="btn-accion btn-no-interesa" onclick="eliminarDeFavoritos(${index})">Quitar de favoritos</button>
                    </div>
                `;
            });
        }

        function eliminarDeFavoritos(index) {
            const favoritos = obtenerFavoritos();
            favoritos.splice(index, 1);
            localStorage.setItem('favoritos', JSON.stringify(favoritos));
            cargarFavoritos();
        }

        document.addEventListener('DOMContentLoaded', cargarFavoritos);
    </script>
</body>
</html>
