<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - USAC</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🛒 Mi Carrito</h1>
            <button onclick="location.href='index.html'" class="btn-nav">Volver a la Tienda</button>
        </div>
    </header>

    <main class="container">
        <div id="lista-carrito" class="grid-productos"></div>
        <div id="resumen-pago" style="background: rgb(70, 68, 68); padding: 20px; border-radius: 8px; margin-top: 20px; text-align: right;">
            <h2 id="total-precio">Total: GTQ 0.00</h2>
            <button class="btn-accion btn-carrito" style="width: auto; padding: 10px 40px;">Proceder al pago</button>
        </div>
    </main>

    <script>
        function obtenerCarrito() {
            const datos = localStorage.getItem('carrito');
            if (!datos) return [];

            try {
                const carrito = JSON.parse(datos);
                return Array.isArray(carrito) ? carrito : [];
            } catch (error) {
                console.warn('Carrito inválido en localStorage:', error);
                return [];
            }
        }

        function cargarCarrito() {
            const carrito = obtenerCarrito();
            const contenedor = document.getElementById('lista-carrito');
            const totalElemento = document.getElementById('total-precio');
            let total = 0;

            contenedor.innerHTML = '';

            if (carrito.length === 0) {
                contenedor.innerHTML = "<h3 style='grid-column: 1/-1; text-align: center;'>Tu carrito está vacío.</h3>";
                totalElemento.innerText = 'Total: GTQ 0.00';
                return;
            }

            carrito.forEach((prod, index) => {
                const imagen = prod.image || 'img/placeholder.png';
                const titulo = prod.title || 'Producto sin nombre';
                const precio = typeof prod.price === 'number' ? prod.price : Number(prod.price);
                const precioTexto = Number.isFinite(precio) ? `GTQ ${precio.toFixed(2)}` : 'Precio no disponible';
                total += Number.isFinite(precio) ? precio : 0;

                contenedor.innerHTML += `
                    <div class="producto-card">
                        <img src="${imagen}" class="producto-imagen" style="height: 100px;" alt="${titulo}">
                        <p class="producto-nombre" style="height: auto;">${titulo}</p>
                        <p class="producto-precio">${precioTexto}</p>
                        <button class="btn-accion btn-no-interesa" onclick="eliminarDelCarrito(${index})">Eliminar</button>
                    </div>
                `;
            });

            totalElemento.innerText = `Total: GTQ ${total.toFixed(2)}`;
        }

        function eliminarDelCarrito(index) {
            const carrito = obtenerCarrito();
            carrito.splice(index, 1);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            cargarCarrito();
        }

        document.addEventListener('DOMContentLoaded', cargarCarrito);
    </script>
</body>
</html>
